<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            background: linear-gradient(to right, #ffffff, #eef4ff);
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        .enhanced-search-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .enhanced-search-box, .enhanced-dropdown-container {
            flex: 1;
            position: relative;
            height: 40px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 15px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            transition: 0.3s;
        }

        .enhanced-search-box:hover, .enhanced-dropdown-container:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.02);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.15);
        }

        input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 14px;
            background: transparent;
            color: #333;
        }

        .enhanced-search-icon {
            font-size: 18px;
            color: #7a869a;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .enhanced-search-icon:hover {
            transform: scale(1.2);
            color: #0056b3;
        }

        .enhanced-dropdown-list {
            position: absolute;
            top: 41px;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            max-height: 220px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            padding: 10px 0;
            animation: fadeIn 0.3s ease-in-out;
        }

        .enhanced-dropdown-list div {
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            border-radius: 8px;
        }

        .enhanced-dropdown-list div:hover {
            background: rgba(0, 0, 0, 0.08);
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            .enhanced-search-container {
                flex-direction: column;
                width: 100%;
                gap: 15px;
            }
            .enhanced-dropdown-list {
                top: 58px;
            }
        }
    </style>
</head>
<body>
    <div class="enhanced-search-container">
        <div class="enhanced-search-box">
            <input type="text" placeholder="Type to search...">
            <i class="fas fa-search enhanced-search-icon"></i>
        </div>
        <div class="enhanced-dropdown-container">
            <input type="text" placeholder="Search categories..." id="enhanced-dropdownInput">
            <div class="enhanced-dropdown-list" id="enhanced-dropdownList">
                <div>Technology</div>
                <div>Science</div>
                <div>Business</div>
                <div>Health</div>
                <div>Education</div>
                <div>Sports</div>
                <div>Finance</div>
                <div>Marketing</div>
                <div>Artificial Intelligence</div>
                <div>Cybersecurity</div>
                <div>Cloud Computing</div>
                <div>Machine Learning</div>
                <div>Web Development</div>
                <div>Data Science</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const dropdownInput = document.getElementById("enhanced-dropdownInput");
            const dropdownList = document.getElementById("enhanced-dropdownList");

            function disableScroll() {
                document.body.style.overflow = "hidden";
            }

            function enableScroll() {
                document.body.style.overflow = "";
            }

            dropdownInput.addEventListener("focus", () => {
                dropdownList.style.display = "block";
                disableScroll();
            });

            dropdownInput.addEventListener("input", () => {
                const filter = dropdownInput.value.toLowerCase();
                document.querySelectorAll(".enhanced-dropdown-list div").forEach(item => {
                    item.style.display = item.textContent.toLowerCase().includes(filter) ? "" : "none";
                });
            });

            dropdownList.addEventListener("wheel", (event) => {
                event.stopPropagation();
            }, { passive: false });

            document.addEventListener("click", (event) => {
                if (!event.target.closest(".enhanced-dropdown-container")) {
                    dropdownList.style.display = "none";
                    enableScroll();
                }
            });

            dropdownList.addEventListener("click", (event) => {
                if (event.target.tagName === "DIV") {
                    dropdownInput.value = event.target.textContent;
                    dropdownList.style.display = "none";
                    enableScroll();
                }
            });
        });
    </script>
</body>
</html>
